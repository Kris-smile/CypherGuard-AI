events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server auth-service:8000;
    }

    upstream kb_service {
        server kb-service:8000;
    }

    upstream chat_service {
        server chat-service:8000;
    }

    upstream model_gateway {
        server model-gateway:8000;
    }

    server {
        listen 80;
        server_name _;

        # Health check endpoint
        location /healthz {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Chat service routes (including /chat/docs, /chat/openapi.json)
        location /chat/ {
            proxy_pass http://chat_service/chat/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Increase timeouts for chat responses
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # KB service routes (including /kb/docs, /kb/openapi.json)
        location /kb/ {
            proxy_pass http://kb_service/kb/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Increase timeouts for file uploads
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Auth service routes (including /auth/docs, /auth/openapi.json)
        location /auth/ {
            proxy_pass http://auth_service/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Model service routes (admin only, internal use)
        location /models/ {
            proxy_pass http://auth_service/models/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Modes routes
        location /modes/ {
            proxy_pass http://auth_service/modes/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default route
        location / {
            return 404 "Not Found\n";
            add_header Content-Type text/plain;
        }
    }
}

