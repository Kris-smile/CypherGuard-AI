events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        client_max_body_size 200M;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' http: https:;" always;

        # Health check
        location /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "OK\n";
        }

        # Auth service
        location /auth/ {
            set $auth_service_url http://auth-service:8000;
            proxy_pass $auth_service_url$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Chat service SSE streaming (must be before /chat/ to match first)
        location ~ ^/chat/conversations/.+/messages/stream$ {
            set $chat_service_url http://chat-service:8000;
            proxy_pass $chat_service_url$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Chat service (includes /chat/modes)
        location /chat/ {
            set $chat_service_url http://chat-service:8000;
            proxy_pass $chat_service_url$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # KB service
        location /kb/ {
            set $kb_service_url http://kb-service:8000;
            proxy_pass $kb_service_url$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Model Config service — match both /models and /models/
        location /models {
            set $model_config_service_url http://model-config-service:8000;
            proxy_pass $model_config_service_url$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Root
        location / {
            add_header Content-Type text/plain;
            return 200 "CypherGuard AI API Gateway\nEndpoints: /auth, /kb, /chat, /models\n";
        }
    }
}
