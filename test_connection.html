<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CypherGuard AI - 连接测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .test-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #ddd;
        }
        .test-item.success {
            border-left-color: #28a745;
            background: #d4edda;
        }
        .test-item.error {
            border-left-color: #dc3545;
            background: #f8d7da;
        }
        .test-item.loading {
            border-left-color: #ffc107;
            background: #fff3cd;
        }
        .test-name {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        .test-result {
            font-size: 14px;
            color: #666;
            font-family: 'Courier New', monospace;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        .status.success {
            background: #28a745;
            color: white;
        }
        .status.error {
            background: #dc3545;
            color: white;
        }
        .status.loading {
            background: #ffc107;
            color: #333;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .info-box {
            background: #e7f3ff;
            border: 1px solid #b3d9ff;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
            color: #004085;
        }
        .info-box strong {
            display: block;
            margin-bottom: 8px;
        }
        .link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ CypherGuard AI</h1>
        <p class="subtitle">前后端连接测试工具</p>
        
        <div id="tests"></div>
        
        <button onclick="runTests()">🔄 重新测试</button>
        
        <div class="info-box">
            <strong>📍 访问地址：</strong>
            前端开发服务器：<a href="http://localhost:5174" class="link" target="_blank">http://localhost:5174</a><br>
            后端 API：<a href="http://localhost" class="link" target="_blank">http://localhost</a>
        </div>
    </div>

    <script>
        const tests = [
            {
                name: 'Gateway 健康检查',
                url: 'http://localhost/healthz',
                method: 'GET',
                expectedStatus: 200
            },
            {
                name: 'Auth Service 连接',
                url: 'http://localhost/auth/me',
                method: 'GET',
                expectedStatus: 401,
                expectedMessage: 'Not authenticated'
            },
            {
                name: 'Chat Service 连接',
                url: 'http://localhost/chat/modes',
                method: 'GET',
                expectedStatus: 200
            },
            {
                name: 'KB Service 连接',
                url: 'http://localhost/kb/documents',
                method: 'GET',
                expectedStatus: 401
            }
        ];

        async function runTest(test) {
            try {
                const response = await fetch(test.url, {
                    method: test.method,
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const isSuccess = response.status === test.expectedStatus;
                let message = `状态码: ${response.status}`;

                if (test.expectedMessage) {
                    const data = await response.json();
                    if (data.detail === test.expectedMessage) {
                        message += ` ✓ (${data.detail})`;
                    } else {
                        message += ` - ${JSON.stringify(data)}`;
                    }
                } else if (response.ok) {
                    message += ' ✓';
                }

                return {
                    success: isSuccess,
                    message: message
                };
            } catch (error) {
                return {
                    success: false,
                    message: `错误: ${error.message}`
                };
            }
        }

        async function runTests() {
            const container = document.getElementById('tests');
            container.innerHTML = '';

            for (const test of tests) {
                const testDiv = document.createElement('div');
                testDiv.className = 'test-item loading';
                testDiv.innerHTML = `
                    <div class="test-name">
                        ${test.name}
                        <span class="status loading">测试中...</span>
                    </div>
                    <div class="test-result">正在连接 ${test.url}</div>
                `;
                container.appendChild(testDiv);

                const result = await runTest(test);

                testDiv.className = `test-item ${result.success ? 'success' : 'error'}`;
                testDiv.innerHTML = `
                    <div class="test-name">
                        ${test.name}
                        <span class="status ${result.success ? 'success' : 'error'}">
                            ${result.success ? '✓ 通过' : '✗ 失败'}
                        </span>
                    </div>
                    <div class="test-result">${result.message}</div>
                `;

                await new Promise(resolve => setTimeout(resolve, 300));
            }
        }

        // 页面加载时自动运行测试
        window.onload = runTests;
    </script>
</body>
</html>
